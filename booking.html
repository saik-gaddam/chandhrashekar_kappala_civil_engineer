<section class="glass-panel">
    <h2>Schedule a Consultation</h2>
    <form action="https://formspree.io/f/YOUR_ID" method="POST" class="contact-form">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <select name="service">
            <option value="consultation">Project Consultation</option>
            <option value="estimation">Cost Estimation</option>
        </select>
        <textarea name="message" placeholder="Project Details" rows="5"></textarea>
        <button type="submit" class="btn-accent">Submit Request</button>
    </form>
</section>

<script>
    const menuBtn = document.getElementById('menuBtn');
    const navLinks = document.getElementById('navLinks');

    menuBtn.addEventListener('click', () => {
        navLinks.classList.toggle('open');
        menuBtn.classList.toggle('open');
        
        // Toggle between Bars and Cross icon
        const icon = menuBtn.querySelector('i');
        if(navLinks.classList.contains('open')) {
            icon.classList.replace('fa-bars', 'fa-times');
        } else {
            icon.classList.replace('fa-times', 'fa-bars');
        }
    });
</script>
