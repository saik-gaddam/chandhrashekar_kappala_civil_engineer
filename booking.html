<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | KCS Civil Engineer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div class="bg">
        <nav>
            <a href="index.html" class="logo">KCS</a>
            <div class="nav-links">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="booking.html" class="active">Book Appointment</a></li>
                </ul>
            </div>
        </nav>

        <main class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6" data-aos="zoom-in">
                    <div class="glass-form-card">
                        <h2 class="text-center mb-4 text-gradient">Schedule a Consultation</h2>
                        <p class="text-center mb-5">Fill in the details below to book your site survey or structural design meeting.</p>
                        
                        <form id="appointment-form">
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="user_name" class="form-control" placeholder="Enter your name" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" name="user_phone" class="form-control" placeholder="+91..." required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Service Type</label>
                                    <select name="service_type" class="form-select">
                                        <option value="Land Survey">Land Survey</option>
                                        <option value="Structural Design">Structural Design</option>
                                        <option value="Site Planning">Site Planning</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Preferred Date & Time</label>
                                <input type="datetime-local" name="appointment_date" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Project Requirements</label>
                                <textarea name="message" class="form-control" rows="3" placeholder="Briefly describe your project..."></textarea>
                            </div>
                            <button type="submit" class="submit-btn w-100">Confirm Appointment</button>
                        </form>
                        <div id="form-status" class="mt-3 text-center"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="booking-script.js"></script>
</body>
</html>
